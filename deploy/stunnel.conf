# stunnel4 configuration for the chatmail server.
#
# Stunnel terminates TLS on the standard DeltaChat submission/IMAPS ports and
# forwards the decrypted plaintext byte stream to the Go chatmail binary, which
# listens only on the loopback interface. The Go process never handles TLS.
#
# Generate a self-signed certificate for the air-gapped network, e.g.:
#   openssl req -x509 -newkey rsa:4096 -nodes -days 3650 \
#       -keyout /etc/stunnel/chatmail.key -out /etc/stunnel/chatmail.crt \
#       -subj "/CN=local.chat"
#   cat /etc/stunnel/chatmail.crt /etc/stunnel/chatmail.key > /etc/stunnel/chatmail.pem
#   chmod 600 /etc/stunnel/chatmail.pem

; Global settings
pid = /run/stunnel-chatmail.pid
cert = /etc/stunnel/chatmail.pem
; foreground = yes        ; uncomment for debugging
; debug = 7

; SMTP submission over implicit TLS (DeltaChat connects here on 587)
[smtp]
accept  = 0.0.0.0:587
connect = 127.0.0.1:1025

; IMAP over implicit TLS (DeltaChat connects here on 993)
[imaps]
accept  = 0.0.0.0:993
connect = 127.0.0.1:1143
