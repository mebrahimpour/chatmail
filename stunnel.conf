; stunnel.conf configuration for Raspberry Pi 4 Chatmail setup
pid = /var/run/stunnel4/stunnel.pid
output = /var/log/stunnel4/stunnel.log

; Certificate and private key (generated by our helper script)
cert = /etc/stunnel/stunnel.pem
key = /etc/stunnel/stunnel.pem

; Run in foreground? (Usually systemd manages this, so we default to standard daemon mode)
foreground = no

; Protocol, cipher selection, and TLS versions for modern security.
; Use a minimum TLS version instead of pinning a single protocol version so
; stunnel can negotiate TLS 1.2 or newer, including TLS 1.3 where supported.
sslVersionMin = TLSv1.2
options = NO_SSLv2
options = NO_SSLv3
options = SINGLE_ECDH_USE
options = SINGLE_DH_USE

[imaps]
accept = 0.0.0.0:993
connect = 127.0.0.1:1143

[smtps]
accept = 0.0.0.0:465
connect = 127.0.0.1:1025

[smtps-submission]
accept = 0.0.0.0:587
connect = 127.0.0.1:1025
